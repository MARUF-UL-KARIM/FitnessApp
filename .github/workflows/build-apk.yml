name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manually triggering the build from the GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Sync Capacitor Web Assets to Android
        run: npx cap sync android

      - name: Download clean Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -sSLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradle/wrapper/gradle-wrapper.jar

      - name: Fix line endings in Gradlew (CRLFs)
        run: sed -i -e 's/\r$//' android/gradlew

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Diagnostics - Print Environment Info
        run: |
          echo "=== Java Version ==="
          java -version
          echo "=== Gradle Version ==="
          cd android && ./gradlew --version

      - name: Build Android APK (Debug)
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate and Verify APK
        run: |
          echo "Locating built APKs..."
          find android/app/build/outputs/apk/ -name "*.apk"
          
      - name: Create Build Summary
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/ -name "app-debug.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            FILE_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "### :white_check_mark: Android Build Succeeded! :rocket:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Artifact Type:** Android Debug APK" >> $GITHUB_STEP_SUMMARY
            echo "- **File Size:** $FILE_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **Package Name:** com.mohammadmaruf.fitnesssimulator" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** Ready for download from the workflow artifacts list below." >> $GITHUB_STEP_SUMMARY
          else
            echo "### :x: Android Build Failed - APK Not Found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-simulator-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

