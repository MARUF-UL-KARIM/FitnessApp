name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: '26.2.11394342'

      - name: Build web app with Vite
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Create Capacitor config if missing
        run: |
          if [ ! -f "capacitor.config.ts" ]; then
            cat > capacitor.config.ts << 'EOF'
            import type { CapacitorConfig } from '@capacitor/cli';

            const config: CapacitorConfig = {
              appId: 'com.fitnessapp.app',
              appName: 'FitnessApp',
              webDir: 'dist',
              server: {
                androidScheme: 'https'
              }
            };

            export default config;
            EOF
          fi

      - name: Initialize Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap init FitnessApp com.fitnessapp.app
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Make Gradle executable
        run: |
          cd android
          chmod +x gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace -x lint

      - name: Verify APK was created
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built successfully!"
            ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fitness-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Directory Structure ==="
          ls -la
          echo "=== Android Directory ==="
          ls -la android/ || echo "No android directory"
          echo "=== App Build Outputs ==="
          ls -la android/app/build/outputs/ || echo "No build outputs"
