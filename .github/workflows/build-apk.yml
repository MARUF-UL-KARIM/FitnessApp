name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manually triggering the build from the GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Sync Capacitor Web Assets to Android
        run: npx cap sync android

      - name: Fix line endings in Gradlew (CRLFs)
        run: sed -i -e 's/\r$//' android/gradlew

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate and Verify APK
        run: |
          echo "Locating built APKs..."
          find android/app/build/outputs/apk/ -name "*.apk"
          
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-simulator-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
